version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: grava-linux-amd64
    main: ./cmd/grava
    binary: grava
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -extldflags "-static"

  - id: grava-linux-arm64
    main: ./cmd/grava
    binary: grava
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - arm64
    ldflags:
      - -s -w
      - -extldflags "-static"

  - id: grava-darwin-amd64
    main: ./cmd/grava
    binary: grava
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
    ldflags:
      - -s -w

  - id: grava-darwin-arm64
    main: ./cmd/grava
    binary: grava
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - arm64
    ldflags:
      - -s -w

  - id: grava-windows-amd64
    main: ./cmd/grava
    binary: grava.exe
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
    ldflags:
      - -s -w

archives:
  - id: grava-archive
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: true
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## Grava v{{.Version}}
    
    Pre-compiled standalone binaries for Linux, macOS (Intel & Apple Silicon), and Windows.
