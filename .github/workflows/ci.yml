name: CI

on:
  push:
    branches: [ "main", "release" ]
  pull_request:
    branches: [ "main", "release" ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache: true

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y default-mysql-client

      - name: Start Dolt Database
        run: |
          go run cmd/grava/main.go init
          # Wait for it to become healthy
          for i in {1..15}; do
            mysqladmin ping -h 127.0.0.1 -P 3306 -u root --silent && break
            echo "Waiting for Dolt..."
            sleep 2
          done

      - name: Set up test database
        run: |
          chmod +x ./scripts/setup_test_env.sh
          ./scripts/setup_test_env.sh
        
      - name: Run Unit Tests
        env:
          DB_URL: "root@tcp(127.0.0.1:3306)/test_grava?parseTime=true"
        run: go test -v -race ./...
